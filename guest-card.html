<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guest Card - Willy Lopez</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --navy: #0B1628;
    --navy-2: #102035;
    --gold: #C8943A;
    --gold-lt: #E8B870;
    --gold-dark: #A07828;
    --gold-tint: #F7EDDD;
    --text: #1A1F2E;
    --muted: #54606E;
    --border: #D0D4D9;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #E7E9EC;
    font-family: var(--sans);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .toolbar {
    max-width: 800px;
    margin: 18px auto 0;
    padding: 0 16px;
    display: flex;
    justify-content: flex-end;
  }
  .toolbar button {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.9rem;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    cursor: pointer;
  }
  .toolbar button:hover { background: var(--navy-2); }

  .page {
    max-width: 800px;
    margin: 14px auto 40px;
    background: var(--cream);
    box-shadow: 0 6px 30px rgba(11,22,40,0.16);
  }

  .header {
    background: linear-gradient(160deg, #08111E 0%, #0D1C30 45%, #0C1A2C 100%);
    padding: 26px 40px 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .wordmark {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 1.7rem;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin: 0;
  }
  .tagline {
    font-family: var(--sans);
    font-size: 0.8rem;
    color: #C9D2E0;
    margin: 4px 0 0;
  }
  .doc-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--gold-lt);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-align: right;
    white-space: nowrap;
  }

  .body { padding: 26px 40px 8px; }

  .callout {
    background: var(--gold-tint);
    border-left: 3px solid var(--gold);
    padding: 12px 16px;
    font-size: 0.88rem;
    line-height: 1.4;
    color: var(--navy-2);
    margin-bottom: 22px;
  }
  .callout strong { color: var(--navy); }

  section { margin-bottom: 20px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px 22px;
  }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 3px;
  }
  .field input {
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--text);
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
    padding: 4px 2px 6px;
    outline: none;
  }
  .field input:focus { border-bottom: 1px solid var(--gold-dark); }
  .field textarea {
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    padding: 8px 10px;
    outline: none;
    resize: none;
    min-height: 70px;
  }
  .field textarea:focus { border-color: var(--gold-dark); }

  .footer {
    background: var(--navy);
    padding: 14px 40px;
    border-top: 2px solid var(--gold);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .footer, .footer * {
    font-family: var(--sans);
    font-size: 0.75rem;
    color: var(--gold-lt);
  }

  @media (max-width: 480px) {
    .body { padding: 22px 20px 8px; }
    .header { padding: 22px 20px 18px; }
    .footer { padding: 14px 20px; }
    .grid { grid-template-columns: 1fr; }
  }

  @media print {
    html, body { background: #fff; }
    .toolbar { display: none; }
    .page { box-shadow: none; margin: 0 auto; max-width: 100%; }
    @page { size: letter; margin: 0.5in; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <button onclick="window.print()">Print / Save as PDF</button>
  </div>

  <div class="page">
    <div class="header">
      <div>
        <p class="wordmark">WILLY LOPEZ</p>
        <p class="tagline">Central Florida Apartment Locator</p>
      </div>
      <div class="doc-title">Guest Card</div>
    </div>

    <div class="body">
      <div class="callout">
        <strong>Registered referral of the agent below.</strong> Commission due upon approval and move-in.
      </div>

      <section>
        <div class="grid">
          <div class="field"><label>Prospect Name</label><input type="text" /></div>
          <div class="field"><label>Phone</label><input type="text" /></div>
          <div class="field"><label>Property</label><input type="text" /></div>
          <div class="field"><label>Date</label><input type="text" /></div>
          <div class="field full"><label>Agent</label><input type="text" value="Willy Lopez - Taylor Apartment Locator, Lic. SL3617612" /></div>
          <div class="field full"><label>Notes</label><textarea rows="3"></textarea></div>
        </div>
      </section>
    </div>

    <div class="footer">
      <span>Willy Lopez &middot; Taylor Apartment Locator &middot; Lic. SL3617612</span>
      <span>wadonisrei@gmail.com</span>
    </div>
  </div>

</body>
</html>
